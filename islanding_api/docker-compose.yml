services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: aegis_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
    ports:
      - "5432:5432"
    volumes:
      - aegis_pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegis}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: web UI to browse tables at localhost:8080 without psql.
  # Delete this block if you don't want it.
  adminer:
    image: adminer:latest
    container_name: aegis_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  aegis_pgdata:
